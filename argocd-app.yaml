apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-first-gitops-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/nghieptb11/lab-gke-manifests.git'
    targetRevision: HEAD
    path: apps
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=false