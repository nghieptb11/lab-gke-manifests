apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lab-gke-frontend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/nghieptb11/lab-gke-manifests.git
    targetRevision: main
    path: application-helm-charts/lab-gke-frontend
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true      # Tự động xóa tài nguyên thừa
      selfHeal: true   # Tự động sửa đổi nếu có ai đó can thiệp thủ công vào K8s
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m